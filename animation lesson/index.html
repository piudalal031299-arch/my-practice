
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation lesson</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="heading-sec">
        <div class="heading">
            <h2>Animation</h2>
        </div>
    </div>
    <section class="animation-sec">
        <div class="animation-col fade"></div>
        <div class="animation-col slide"></div> 
        <div class="animation-col bounce"></div>
        <div class="animation-col bordermove"></div>

    </section>
    <section class="button-style">
        <button class="animated-btn btn-1">Click me!</button>
        <button class="animated-btn btn-2">Click me!</button>
        <button class="animated-btn btn-3">Click me!</button>
        <button class="btn-4">Click me!</button>
        <button class="animated-btn btn-5">Click me!</button>
        <button class="animated-btn btn-6">Click me!</button>
        <button class="animated-btn btn-7">Hover me!</button>
        <button class=" btn-8">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <p>BUTTON</p>
        </button>

    <div class="animated-img">
        <img src="images/bg-car1.webp" alt="">
    </div>
    </section>
</body>
</html>
